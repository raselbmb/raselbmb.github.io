<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/images/monkey.ico">
    <title>raselbmb - Terminal</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
            font-size: 16px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        #top-half {
            margin-bottom: 20px;
            border-bottom: 1px dashed #00ff00;
            padding-bottom: 20px;
        }
        .line {
            margin: 5px 0;
            line-height: 1.4;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        button {
            background-color: transparent;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) {
            background-color: #00ff00;
            color: #0c0c0c;
        }
        button:disabled {
            border-color: #005500;
            color: #005500;
            cursor: not-allowed;
        }
        #bottom-half {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            background-color: #050505;
            border: 1px solid #003300;
        }
        .output-line {
            margin: 4px 0;
        }
    </style>
</head>
<body>
    <div id="top-half">
        <div class="line">raselbmbOS v1.0.0 (tty1)</div>
        <div class="line">Welcome to my personal space.</div>
        <div class="line">Select a command to execute:</div>
        
        <div class="action-buttons">
            <button id="btn-cv" onclick="executeCommand('cv')">[ ./view_cv.sh ]</button>
            <button id="btn-resume" onclick="executeCommand('resume')">[ ./view_resume.sh ]</button>
            <button id="btn-github" onclick="executeCommand('github')">[ ./open_github.sh ]</button>
            <button id="btn-simulation" onclick="executeCommand('simulation')">[ ./run_simulation.sh ]</button>
        </div>
    </div>

    <div id="bottom-half">
        <div id="output"></div>
    </div>

    <script>
        const outputDiv = document.getElementById('output');
        const buttons = document.querySelectorAll('button');

        // Reset the page state when navigating back via browser history
        window.addEventListener('pageshow', function (event) {
            buttons.forEach(btn => btn.disabled = false);
            outputDiv.innerHTML = ''; // Clear terminal output
        });

        function printLine(text) {
            const div = document.createElement('div');
            div.className = 'output-line';
            div.textContent = text;
            outputDiv.appendChild(div);
            
            // Auto-scroll to bottom
            const bottomHalf = document.getElementById('bottom-half');
            bottomHalf.scrollTop = bottomHalf.scrollHeight;
        }

        function executeCommand(command) {
            // Disable buttons to prevent multiple clicks
            buttons.forEach(btn => btn.disabled = true);
            
            // Clear previous output
            outputDiv.innerHTML = '';
            
            printLine(`guest@raselbmb:~$ executing ${command}...`);

            const simulationSteps = [
                "> Initializing core modules...",
                "> Extracting user payload...",
                "> Compiling dependencies [||||||||||20%]...",
                "> Compiling dependencies [||||||||||||||||||||||100%]...",
                "> Resolving internal state parameters...",
                "> Establishing secure routing protocol...",
                "> Access granted. Redirecting..."
            ];

            let delay = 0;
            simulationSteps.forEach((step, index) => {
                setTimeout(() => {
                    const timestamp = new Date().toISOString().split('T')[1].slice(0, -1);
                    printLine(`[${timestamp}] ${step}`);
                    
                    if (index === simulationSteps.length - 1) {
                        setTimeout(() => {
                            redirect(command);
                        }, 800);
                    }
                }, delay);
                
                delay += 400 + Math.random() * 600; 
            });
        }

        function redirect(command) {
            if (command === 'cv') {
                window.location.href = '/cv.html'; 
            } else if (command === 'resume') {
                window.location.href = '/resume.html'; 
            } else if (command === 'github') {
                window.location.href = 'https://github.com/raselbmb';
            } else if (command === 'simulation') {
                window.location.href = '/simulation.html'; 
            }
        }
    </script>
</body>
</html>
