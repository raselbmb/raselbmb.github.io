<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>raselbmb - Terminal</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
            font-size: 16px;
        }
        #terminal {
            max-width: 800px;
            margin: 0 auto;
        }
        .line {
            margin: 5px 0;
            line-height: 1.4;
        }
        .prompt-line {
            display: flex;
            align-items: center;
        }
        .prompt {
            color: #00ff00;
            margin-right: 10px;
            white-space: nowrap;
        }
        .highlight {
            color: #ffffff;
            font-weight: bold;
        }
        input {
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            outline: none;
            flex-grow: 1;
            caret-color: #00ff00;
        }
    </style>
</head>
<body>
    <div id="terminal">
        <div class="line">raselbmbOS v1.0.0 (tty1)</div>
        <div class="line">Welcome to my personal space.</div>
        <div class="line"><br>Type <span class="highlight">CV</span>, <span class="highlight">Github</span>, or <span class="highlight">Simulation</span> to view.</div>
        <div class="line"><br></div>
        
        <div id="output"></div>
        
        <div class="prompt-line" id="input-line">
            <span class="prompt">guest@raselbmb:~$</span>
            <input type="text" id="cmd" autocomplete="off" spellcheck="false" autofocus>
        </div>
    </div>

    <script>
        const cmdInput = document.getElementById('cmd');
        const outputDiv = document.getElementById('output');
        const inputLine = document.getElementById('input-line');

        // Keep focus on the input field whenever the user clicks anywhere on the page
        document.addEventListener('click', () => {
            if (inputLine.style.display !== 'none') {
                cmdInput.focus();
            }
        });

        cmdInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const val = this.value.trim().toLowerCase();
                this.value = '';
                
                // Echo the command back to the terminal
                printLine(`guest@raselbmb:~$ ${val}`);

                if (val === 'cv' || val === 'github' || val === 'simulation') {
                    // Hide input to prevent further typing during simulation
                    inputLine.style.display = 'none';
                    simulateCodingAndRedirect(val);
                } else if (val === '') {
                    // Empty enter, do nothing
                } else {
                    printLine(`bash: ${val}: command not found. Available commands: CV, Github, Simulation`);
                }
            }
        });

        function printLine(text) {
            const div = document.createElement('div');
            div.className = 'line';
            div.textContent = text;
            outputDiv.appendChild(div);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function simulateCodingAndRedirect(command) {
            // Fake compiling / hacking terminal lines
            const simulationSteps = [
                "> Initializing core modules...",
                "> Extracting user payload...",
                "> Compiling dependencies [||||||||||20%]...",
                "> Compiling dependencies [||||||||||||||||||||||100%]...",
                "> Resolving internal state parameters...",
                "> Establishing secure routing protocol...",
                "> Access granted. Redirecting..."
            ];

            let delay = 0;
            simulationSteps.forEach((step, index) => {
                setTimeout(() => {
                    // Add timestamp to look like real logs
                    const timestamp = new Date().toISOString().split('T')[1].slice(0, -1);
                    printLine(`[${timestamp}] ${step}`);
                    
                    // Once the last step completes, execute the redirect
                    if (index === simulationSteps.length - 1) {
                        setTimeout(() => {
                            redirect(command);
                        }, 800);
                    }
                }, delay);
                
                // Increase delay for the next line (between 400ms and 1000ms)
                delay += 400 + Math.random() * 600; 
            });
        }

        function redirect(command) {
            if (command === 'cv') {
                // Update this to the actual path of your CV page
                window.location.href = '/cv.html'; 
            } else if (command === 'github') {
                window.location.href = 'https://github.com/raselbmb';
            } else if (command === 'simulation') {
                // Update this to the actual path of your simulation page
                window.location.href = '/simulation.html'; 
            }
        }
    </script>
</body>
</html>
